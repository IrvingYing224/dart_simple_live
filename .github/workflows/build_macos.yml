name: Build macOS Client

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - 'simple_live_app/**'
      - 'simple_live_core/**'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      # --- 核心库 simple_live_core ---
      - name: Resolve Core Dependencies
        working-directory: ./simple_live_core
        run: flutter pub get

      - name: Run Core Build Runner
        working-directory: ./simple_live_core
        run: dart run build_runner build --delete-conflicting-outputs || echo "build_runner skipped for core"

      # --- 客户端 simple_live_app ---
      - name: Resolve App Dependencies
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: Run App Build Runner
        working-directory: ./simple_live_app
        run: dart run build_runner build --delete-conflicting-outputs || echo "build_runner skipped for app"

      # --- 禁用 Xcode 强制签名 (防止构建失败) ---
      - name: Disable Code Signing Requirement
        working-directory: ./simple_live_app/macos
        run: |
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj

      # --- 构建 ---
      - name: Build macOS Release
        working-directory: ./simple_live_app
        run: flutter build macos --release

      # --- 【关键修复步骤】手动添加 Ad-hoc 签名 ---
      # Apple Silicon 必须有签名才能运行，这里使用 "-" 进行本地自签名，同时 --deep 确保 framework 也被签名
      - name: Ad-hoc Sign App
        working-directory: ./simple_live_app/build/macos/Build/Products/Release
        run: |
          echo "Applying ad-hoc signature..."
          codesign --force --deep --sign - "Simple Live.app"

      # --- 打包 ---
      - name: Package Application
        working-directory: ./simple_live_app/build/macos/Build/Products/Release
        run: |
          APP_NAME=$(find . -maxdepth 1 -name "*.app" -type d -print -quit)
          if [ -z "$APP_NAME" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          zip -r simple_live_macos.zip "$APP_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-macOS
          path: ./simple_live_app/build/macos/Build/Products/Release/simple_live_macos.zip
          retention-days: 7
