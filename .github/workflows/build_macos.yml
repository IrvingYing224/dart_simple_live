name: Build macOS Client

on:
  workflow_dispatch: # 允许手动触发构建
  push:
    branches:
      - master
      - dev
    paths:
      - 'simple_live_app/**'
      - 'simple_live_core/**'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # 根据项目要求锁定在 3.22 版本
          channel: 'stable'

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      # --- 处理核心库 simple_live_core ---
      - name: Resolve Core Dependencies
        working-directory: ./simple_live_core
        run: flutter pub get

      - name: Run Core Build Runner
        working-directory: ./simple_live_core
        # 尝试运行代码生成，如果失败（可能不需要）则忽略错误继续
        run: dart run build_runner build --delete-conflicting-outputs || echo "build_runner skipped for core"

      # --- 处理客户端 simple_live_app ---
      - name: Resolve App Dependencies
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: Run App Build Runner
        working-directory: ./simple_live_app
        # 生成 JSON 序列化代码等
        run: dart run build_runner build --delete-conflicting-outputs || echo "build_runner skipped for app"

      - name: Build macOS Release
        working-directory: ./simple_live_app
        # 使用 --no-codesign 跳过签名，因为云编译环境没有你的开发者证书
        run: flutter build macos --release --no-codesign

      # --- 打包和上传 ---
      - name: Package Application
        working-directory: ./simple_live_app/build/macos/Build/Products/Release
        run: |
          echo "Packaging app..."
          # 查找 .app 文件并压缩
          APP_NAME=$(find . -maxdepth 1 -name "*.app" -type d -print -quit)
          if [ -z "$APP_NAME" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          zip -r simple_live_macos.zip "$APP_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-macOS
          path: ./simple_live_app/build/macos/Build/Products/Release/simple_live_macos.zip
          retention-days: 7
