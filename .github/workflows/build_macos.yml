name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' # 版本可与原项目 pubspec 中保持一致
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      # ⚠️ macOS 依赖初始化
      - name: Enable macOS build
        run: flutter config --enable-macos-desktop

      # ✅ 如果项目用到 ffmpeg / mpv，请提前安装（原项目依赖 video_player/mpv）
      - name: Install ffmpeg and mpv
        run: |
          brew install ffmpeg mpv || true
          brew link mpv || true

      - name: Build release version
        run: flutter build macos --release

      - name: Package .app
        run: |
          APP_PATH="build/macos/Build/Products/Release/Simple Live.app"
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" out/SimpleLive-mac.zip
          ls -lh out

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-macos
          path: out/SimpleLive-mac.zip
