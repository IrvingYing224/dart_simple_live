name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      # 进入 simple_live_app/ 才能找到 pubspec.yaml
      - name: Get dependencies
        working-directory: simple_live_app
        run: flutter pub get

      - name: Enable macOS build
        working-directory: simple_live_app
        run: flutter config --enable-macos-desktop

      # 安装 macOS 播放相关依赖（确保 mpv/ffmpeg 存在，否则播放时会崩）
      - name: Install ffmpeg and mpv
        run: |
          brew install ffmpeg mpv || true
          brew link mpv || true

      - name: Build macOS release
        working-directory: simple_live_app
        run: flutter build macos --release

      - name: Package .app
        run: |
          APP_PATH="simple_live_app/build/macos/Build/Products/Release/Simple Live.app"
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" out/SimpleLive-mac.zip
          ls -lh out

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-macos
          path: out/SimpleLive-mac.zip
