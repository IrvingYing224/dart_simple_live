name: Build macOS App

on:
  workflow_dispatch: # 手动触发

jobs:
  build-macos:
    runs-on: macos-latest # 使用 GitHub 的 Mac 服务器
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # 锁定版本
          channel: 'stable'
          
      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get
          # macOS 也是需要 CocoaPods 的
          cd macos
          pod install --repo-update
          
      - name: Build macOS App (Release)
        run: |
          cd simple_live_app
          flutter build macos --release
          
# ... 前面的步骤保持不变 ...

      - name: Compress App
        run: |
          # 进入编译输出目录
          cd simple_live_app/build/macos/Build/Products/Release
          
          # 调试步骤：打印一下这里面到底有什么文件
          echo "Listing files in Release directory:"
          ls -al
          
          # 修正步骤：使用 *.app 通配符
          # 这样无论它叫 Runner.app 还是 simple_live_app.app，都能打包
          zip -r simple_live_macos.zip *.app
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_live_macos_app
          # 这里的路径要对应上面生成的 zip
          path: simple_live_app/build/macos/Build/Products/Release/simple_live_macos.zip
